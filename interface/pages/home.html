<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../assets/styles/style.css">
    <title>Type Trainer</title>
</head>
<body>
    <div class="app">
        <h1>Type Trainer</h1>

        <div id="game-screen">
            <div id="settings-panel">
                <div class="mode-switcher">
                    <div class="group-btn">
                        <button class="btn-mode" data-toggle="punctuations">punctuations</button>
                        <button class="btn-mode" data-toggle="numbers">numbers</button>
                        <button class="btn-mode" data-toggle="capitals">capitals</button>
                    </div>

                    <div class="group-btn">
                        <button class="btn-mode active" data-mode="time">time</button>
                        <button class="btn-mode" data-mode="words">words</button>
                    </div>

                    <div class="group-btn" id="value-switcher"></div>
                </div>

                <label for="language-select"></label>
                <select name="mode" id="language-select">
                    <option value="en">English</option>
                    <option value="ru">Russian</option>
                    <option value="go">Code go</option>
                </select>
            </div>

            <div class="counter hidden" id="counter"></div>
            <div class="text" id="text"></div>
            <div id="generate">
                <svg xmlns="http://www.w3.org/2000/svg"
                        width="40" height="40"
                        viewBox="0 0 24 24" fill="none"
                        stroke="oldlace" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round"
                        opacity="0.3">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
            </div>
        </div>

        <div id="results-screen" class="hidden">
            <h2>Results</h2>

            <div class="main-stats">
                <div class="stat">
                    <div class="stat-title">wpm</div>
                    <div id="wpm" class="stat-value">0%</div>
                </div>

                <div class="stat">
                    <div class="stat-title">accuracy</div>
                    <div id="accuracy" class="stat-value">100%</div>
                </div>
            </div>

            <div class="chart"></div>

            <div class="other-stats">
                <div class="stat">
                    <div class="stat-title">test type</div>
                    <div id="test-type">time 30s</div>
                </div>

                <div class="stat">
                    <div class="stat-title">mistakes</div>
                    <div id="mistakes">0</div>
                </div>

                <div class="stat">
                    <div class="stat-title">time</div>
                    <div id="time">0s</div>
                </div>

                <div class="stat">
                    <div class="stat-title">stats</div>
                    <div id="stats">100/0</div>
                </div>
            </div>

            <button id="restart">Restart</button>
        </div>
    </div>

    <script type="module" src="../assets/scripts/main.js"></script>
</body>
</html>
